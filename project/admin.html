<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #090d16;
            color: #f3f4f6;
        }
    </style>
</head>

<body>

    <div id="login-section" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-[#111827] border border-gray-800 p-8 rounded-xl w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-semibold text-center text-white mb-1">Admin Login</h2>
            <p class="text-gray-400 text-xs text-center mb-6">Silakan masuk untuk mengelola project portofolio Anda.</p>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">
                        Email Address
                    </label>
                    <input type="email" id="login-email" required
                        class="w-full bg-[#1f2937]/50 border border-gray-700/70 rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-gray-500 transition placeholder-gray-600">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">
                        Password
                    </label>
                    <input type="password" id="login-password" required
                        class="w-full bg-[#1f2937]/50 border border-gray-700/70 rounded-lg px-4 py-2 text-sm text-white focus:outline-none focus:border-gray-500 transition">
                </div>
                <button type="submit"
                    class="w-full bg-white hover:bg-gray-200 text-gray-900 text-sm font-semibold py-2.5 rounded-lg transition-all duration-200 shadow-md mt-2">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard-section" class="hidden min-h-screen flex flex-col">
        <header class="border-b border-gray-800 bg-[#111827]/60 backdrop-blur px-6 py-3.5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-gray-400 hover:text-white transition text-xs flex items-center gap-1">
                    &larr; Lihat Web
                </a>
                <span class="text-gray-700">|</span>
                <h1 class="text-sm font-semibold tracking-wide text-white">Dashboard Admin</h1>
            </div>
            <button id="btn-logout"
                class="bg-transparent hover:bg-gray-800 text-gray-300 border border-gray-700 px-3 py-1 rounded-md text-xs font-medium transition">
                Logout
            </button>
        </header>

        <main class="flex-1 max-w-6xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-[#111827] border border-gray-800 p-5 rounded-xl h-fit shadow-md">
                <input type="hidden" id="p-id" value="">
                
                <h3 id="form-title" class="text-sm font-semibold text-white mb-4 tracking-wide">Tambah Project Baru</h3>
                <form id="project-form" class="space-y-4">
                    <div>
                        <label class="block text-[11px] text-gray-400 mb-1">Judul Project</label>
                        <input type="text" id="p-title" required
                            class="w-full bg-[#1f2937]/40 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-gray-500 transition">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400 mb-1">Deskripsi Singkat</label>
                        <textarea id="p-desc" rows="3" required
                            class="w-full bg-[#1f2937]/40 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-gray-500 transition resize-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400 mb-1">URL Gambar / Screenshot</label>
                        <input type="url" id="p-image" placeholder="https://..."
                            class="w-full bg-[#1f2937]/40 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-gray-500 transition placeholder-gray-600">
                    </div>
                    <div>
                        <label class="block text-[11px] text-gray-400 mb-1">Link Demo / GitHub</label>
                        <input type="url" id="p-link" placeholder="https://..."
                            class="w-full bg-[#1f2937]/40 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-gray-500 transition placeholder-gray-600">
                    </div>
                    
                    <div class="pt-2 space-y-2">
                        <button type="submit" id="btn-submit"
                            class="w-full bg-gray-800 hover:bg-gray-700 text-white font-medium py-2 rounded-lg text-xs tracking-wide transition border border-gray-700 shadow-sm">
                            Simpan ke Database
                        </button>
                        <button type="button" id="btn-cancel"
                            class="hidden w-full bg-transparent hover:bg-gray-800 text-gray-400 font-medium py-2 rounded-lg text-xs transition border border-transparent">
                            Batal Edit
                        </button>
                    </div>
                </form>
            </div>

            <div class="lg:col-span-2 bg-[#111827] border border-gray-800 p-5 rounded-xl shadow-md">
                <h3 class="text-sm font-semibold text-white mb-4 tracking-wide">Daftar Project Terpasang</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="border-b border-gray-800 text-gray-500 text-[10px] uppercase tracking-widest">
                                <th class="pb-3 font-semibold">Project</th>
                                <th class="pb-3 w-32 text-right font-semibold">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-gray-800/60 text-gray-300">
                            </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>

</html>
