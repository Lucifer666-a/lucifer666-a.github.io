<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nando | Featured Projects</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
            animation: moveBg 60s linear infinite;
        }

        @keyframes moveBg {
            from { background-position: 0 0; }
            to { background-position: 100% 100%; }
        }

        /* Animasi Meluncur dari Kiri ke Kanan */
        @keyframes slideFromLeft {
            from {
                opacity: 0;
                transform: translateX(-200px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Animasi Meluncur dari Kanan ke Kiri */
        @keyframes slideFromRight {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Class Pembantu */
        .animate-left {
            animation: slideFromLeft 3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-right {
            animation: slideFromRight 3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Animasi Pantulan Cahaya Mengalir */
        @keyframes shine {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }
        .animate-text-shine {
            background: linear-gradient(to right, #6b7280 20%, #ffffff 40%, #ffffff 60%, #6b7280 80%);
            background-size: 200% auto;
            /* SEBELUMNYA SALAH: Kurang tanda strip (-) di depan webkit */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text; /* Standar browser modern */
            animation: shine 6s linear infinite;
        }

            @keyframes cardSlideUp {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
                filter: blur(4px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
                filter: blur(0);
            }
        }

        /* Terapkan ke semua anak element di project-container */
        #project-container > div {
            opacity: 0; /* Menunggu giliran animasi berjalan */
            animation: cardSlideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease, border-color 0.3s ease;
        }

        /* Memberikan jeda delay animasi biar card munculnya gantian/berseri ala loading inventory game */
        #project-container > div:nth-child(1) { animation-delay: 1.1s; }
        #project-container > div:nth-child(2) { animation-delay: 1.2s; }
        #project-container > div:nth-child(3) { animation-delay: 1.3s; }
        #project-container > div:nth-child(4) { animation-delay: 1.4s; }
        #project-container > div:nth-child(5) { animation-delay: 1.5s; }
        #project-container > div:nth-child(6) { animation-delay: 1.6s; }

        /* 2. Efek Hover Card Membesar + Border Menyala Putih Bersih */
        #project-container > div:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.6), 
                        0 0 15px 1px rgba(255, 255, 255, 0.08);
            z-index: 10;
        }

        /* 3. Animasi Indicator Pulse Kecil buat Status di dalam Card (jika ada badge) */
        @keyframes statusPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
        .ui-pulse {
            animation: statusPulse 2s infinite ease-in-out;
        }
        
    </style>
</head>

<body class="min-h-screen flex flex-col justify-between">


    <nav class="max-w-5xl w-full mx-auto px-6 py-6 flex justify-between items-center overflow-hidden">
        <!-- Ditambah class animate-left -->
        <a href="../index.html" class="animate-left text-xs uppercase font-medium tracking-widest text-gray-400 hover:text-white transition-colors duration-200">
            &larr; ESC_RETURN
        </a>
        
        <!-- Ditambah class animate-right -->
        <a href="admin.html" class="animate-right text-[10px] uppercase font-mono tracking-wider text-gray-500 hover:text-white border border-gray-800 hover:border-white px-3 py-1.5 transition-all duration-200 rounded-sm">
            <i class="fas fa-lock text-[9px] mr-1.5"></i> Admin Access
        </a>
    </nav>

    <!-- PROJECTS SECTION -->
    <main class="max-w-5xl w-full mx-auto px-6 py-8 flex-1">
        
        <!-- HEADER HALAMAN (Ditambah class animate-left agar barengan sama ESC_RETURN) -->
        <div class="animate-left mb-12 border-b border-white/5 pb-6">
            <span class="text-[10px] font-mono uppercase tracking-widest text-gray-500 block mb-1">Loadout // Proyektor</span>
            <h1 class="text-2xl font-extrabold tracking-tight text-white uppercase animate-text-shine">
                Featured Projects
            </h1>
            <p class="text-gray-400 text-xs mt-1 uppercase tracking-wide">
                Daftar arsip fungsional yang dikelola secara dinamis menggunakan Firebase Firestore.
            </p>
        </div>

        <!-- CONTAINER UTAMA GRID PROJECT -->
        <div id="project-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Render data dari app.js -->
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="border-t border-white/5 text-center py-6 text-[10px] text-gray-600 tracking-widest uppercase">
        &copy; 2026 Nando. Powered by Firebase Cloud Firestore.
    </footer>

    <!-- Script Utama Eksekusi Database Cloud -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
