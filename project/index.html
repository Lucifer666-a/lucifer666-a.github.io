<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nando | Featured Projects</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
            animation: moveBg 60s linear infinite;
        }

        @keyframes moveBg {
            from { background-position: 0 0; }
            to { background-position: 100% 100%; }
        }

        /* Animasi melayang halus */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        /* Animasi Pantulan Cahaya Mengalir */
        @keyframes shine {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        .animate-text-shine {
            background: linear-gradient(to right, #6b7280 20%, #ffffff 40%, #ffffff 60%, #6b7280 80%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 6s linear infinite;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col justify-between">


    <nav class="max-w-5xl w-full mx-auto px-6 py-6 flex justify-between items-center">
        <a href="../index.html" class="text-xs uppercase font-medium tracking-widest text-gray-400 hover:text-white transition-colors duration-200">
            &larr; ESC_RETURN
        </a>
        
        <!-- TOMBOL ADMIN DASHBOARD (Clean & Simple) -->
        <a href="admin.html" class="text-[10px] uppercase font-mono tracking-wider text-gray-500 hover:text-white border border-gray-800 hover:border-white px-3 py-1.5 transition-all duration-200 rounded-sm">
            <i class="fas fa-lock text-[9px] mr-1.5"></i> Admin Access
        </a>
    </nav>

    <!-- PROJECTS SECTION -->
    <main class="max-w-5xl w-full mx-auto px-6 py-8 flex-1">
        
        <!-- HEADER HALAMAN (Dibikin Clean & Sesuai Gaya Baru) -->
        <div class="mb-12 border-b border-white/5 pb-6">
            <span class="text-[10px] font-mono uppercase tracking-widest text-gray-500 block mb-1">Loadout // Proyektor</span>
            <h1 class="text-2xl font-extrabold tracking-tight text-white uppercase animate-text-shine">
                Featured Projects
            </h1>
            <p class="text-gray-400 text-xs mt-1 uppercase tracking-wide">
                Daftar arsip fungsional yang dikelola secara dinamis menggunakan Firebase Firestore.
            </p>
        </div>

        <!-- CONTAINER UTAMA GRID (Biarkan ID-nya tetap agar app.js tidak eror) -->
        <div id="project-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="text-gray-500 animate-pulse col-span-full text-center py-16 text-xs uppercase tracking-widest font-mono">
                [ LOADING_DATA_FROM_CLOUD_DATABASE... ]
            </div>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="border-t border-white/5 text-center py-6 text-[10px] text-gray-600 tracking-widest uppercase">
        &copy; 2026 Nando. Powered by Firebase Cloud Firestore.
    </footer>

    <!-- Script Utama Eksekusi Database Cloud -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
