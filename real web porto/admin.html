<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Nando Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
        }
    </style>
</head>

<body>

    <div id="login-section" class="min-h-screen flex items-center justify-center px-4">
        <div class="bg-[#111827] border border-gray-800 p-8 rounded-2xl w-full max-w-md shadow-xl">
            <h2 class="text-2xl font-bold text-center text-white mb-2">Admin Login</h2>
            <p class="text-gray-400 text-sm text-center mb-6">Silakan login untuk mengelola project portofolio.</p>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Email
                        Address</label>
                    <input type="email" id="login-email" required
                        class="w-full bg-[#1f2937] border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-cyan-500 transition">
                </div>
                <div>
                    <label
                        class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="login-password" required
                        class="w-full bg-[#1f2937] border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-cyan-500 transition">
                </div>
                <button type="submit"
                    class="w-full bg-gradient-to-r from-cyan-500 to-purple-600 hover:from-cyan-400 hover:to-purple-500 text-white font-medium py-2.5 rounded-lg transition mt-2">
                    Sign In
                </button>
            </form>
        </div>
    </div>

    <div id="dashboard-section" class="hidden min-h-screen flex flex-col">
        <header
            class="border-b border-gray-800 bg-[#0f172a]/80 backdrop-blur px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="index.html" class="text-gray-400 hover:text-white transition text-sm">&larr; Lihat Web</a>
                <h1 class="text-lg font-bold text-white">Dashboard Admin</h1>
            </div>
            <button id="btn-logout"
                class="bg-red-900/40 hover:bg-red-900/60 text-red-400 border border-red-800 px-4 py-1.5 rounded-lg text-sm font-medium transition">
                Logout
            </button>
        </header>

        <main class="flex-1 max-w-6xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-[#111827] border border-gray-800 p-6 rounded-xl h-fit">
                <h3 class="text-lg font-bold text-white mb-4">Tambah Project Baru</h3>
                <form id="project-form" class="space-y-4">
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Judul Project</label>
                        <input type="text" id="p-title" required
                            class="w-full bg-[#1f2937] border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Deskripsi Singkat</label>
                        <textarea id="p-desc" rows="3" required
                            class="w-full bg-[#1f2937] border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">URL Gambar / Screenshot</label>
                        <input type="url" id="p-image" placeholder="https://..."
                            class="w-full bg-[#1f2937] border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-400 mb-1">Link Demo / GitHub</label>
                        <input type="url" id="p-link" placeholder="https://..."
                            class="w-full bg-[#1f2937] border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-cyan-500">
                    </div>
                    <button type="submit"
                        class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-medium py-2 rounded-lg text-sm transition">
                        Simpan ke Database
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 bg-[#111827] border border-gray-800 p-6 rounded-xl">
                <h3 class="text-lg font-bold text-white mb-4">Daftar Project Terpasang</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="border-b border-gray-800 text-gray-400 text-xs uppercase tracking-wider">
                                <th class="pb-3">Project</th>
                                <th class="pb-3 w-24">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body" class="divide-y divide-gray-800">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="js/admin.js"></script>
</body>

</html>
